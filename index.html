<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Nadine's Portfolio</title>

        <!-- FavIcon -->
        <link rel="icon" type="image/svg+xml" href="/images/svg/logo.svg" />

        <!-- Canonical URL -->
        <link rel="canonical" href="/" />

        <!-- Meta: Configurations -->
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
        <meta name="format-detection" content="address=no"/>
        <meta name="color-scheme" content="dark">

        <!-- Meta: SEO -->
        <meta name="keywords" content="Nadine Kievit, software developer, full-stack developer, front-end developer, UI UX, portfolio"/>
        <meta name="robots" content="index, follow"/>
        <meta name="googlebot" content="index, follow"/>
        <meta name="google" content="notranslate"/>
        <meta name="author" content="Nadine Kievit"/>
        <meta name="theme-color" content="#111111"/>

        <!-- Open Graph / Facebook -->
        <meta property="og:type" content="website" />
        <meta property="og:title" content="Nadine Kievit | Software Developer Portfolio" />
        <meta property="og:image" content="/images/pictures/profile-picture.jpeg" />

        <!-- Twitter -->
        <meta property="twitter:card" content="summary_large_image" />
        <meta property="twitter:title" content="Nadine Kievit | Software Developer Portfolio" />
        <meta property="twitter:image" content="/images/pictures/profile-picture.jpeg" />

        <!-- Structured Data -->
        <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "Person",
            "name": "Nadine Kievit"
        }
        </script>

        <!-- Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css?family=Saira:400,700" rel="stylesheet" type="text/css">
        <link href="https://fonts.googleapis.com/css?family=Orbitron:400,700" rel="stylesheet" type="text/css">
        <link href="https://fonts.googleapis.com/css?family=Lato:400,700,400italic,700italic" rel="stylesheet" type="text/css">
    </head>
    <body style="background-color: #111111">
        <div id="root"></div>
        <script type="module" src="/src/main.jsx"></script>
    </body>
</html>
